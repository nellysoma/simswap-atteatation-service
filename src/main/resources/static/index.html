<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SIM Swap Fraud Detection System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background-color: #f5f7fa; }
        .card { border-radius: 12px; }
        .status-allow { color: #198754; font-weight: bold; }
        .status-challenge { color: #fd7e14; font-weight: bold; }
        .status-deny { color: #dc3545; font-weight: bold; }
    </style>
</head>
<body>

<div class="container mt-5">

    <div class="text-center mb-4">
        <h2>SIM Swap Fraud Detection System</h2>
        <p class="text-muted">Transaction Risk Evaluation Dashboard</p>
    </div>

    <!-- NAV TABS -->
    <ul class="nav nav-tabs mb-3" id="tabs">
        <li class="nav-item">
            <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#transactionTab">Transaction</button>
        </li>
        <li class="nav-item">
            <button class="nav-link" data-bs-toggle="tab" data-bs-target="#otpTab">OTP Verification</button>
        </li>
        <li class="nav-item">
            <button class="nav-link" data-bs-toggle="tab" data-bs-target="#logsTab">Activity Logs</button>
        </li>
    </ul>

    <div class="tab-content">

        <!-- 🟢 TRANSACTION TAB -->
        <div class="tab-pane fade show active" id="transactionTab">

            <div class="row">

                <!-- FORM -->
                <div class="col-md-6">
                    <div class="card shadow p-4">

                        <h5>Simulate Transaction</h5>

                        <input id="deviceUuid" class="form-control mb-2" value="demo-device-1" placeholder="Device UUID">

                        <input id="amount" class="form-control mb-2" value="50000" placeholder="Amount">

                        <input id="recipient" class="form-control mb-2" value="John Doe" placeholder="Recipient">

                        <textarea id="payload" class="form-control mb-3">
{"mcc":"621","mnc":"30","city":"Abuja","ipAddress":"102.89.44.21","isRooted":false}
                        </textarea>

                        <button class="btn btn-primary w-100" onclick="runTransaction()">Run Transaction</button>
                    </div>
                </div>

                <!-- RESULT -->
                <div class="col-md-6">
                    <div class="card shadow p-4">

                        <h5>Result</h5>

                        <p><b>Status:</b> <span id="status"></span></p>
                        <p><b>Decision:</b> <span id="decision"></span></p>
                        <p><b>Reason:</b> <span id="reason"></span></p>
                        <p><b>Risk Score:</b> <span id="riskScore"></span></p>
                        <p><b>Transaction ID:</b> <span id="txnIdDisplay"></span></p>

                    </div>
                </div>

            </div>

        </div>

        <!-- 🟡 OTP TAB -->
        <div class="tab-pane fade" id="otpTab">

            <div class="card shadow p-4 col-md-6 mx-auto">

                <h5>OTP Verification</h5>

                <input id="txnId" class="form-control mb-2" placeholder="Transaction ID">

                <input id="otp" class="form-control mb-2" placeholder="Enter OTP">

                <button class="btn btn-success w-100" onclick="verifyOtp()">Verify OTP</button>

                <div class="mt-3" id="otpResult"></div>

            </div>

        </div>

        <!-- 🔵 LOGS TAB -->
        <div class="tab-pane fade" id="logsTab">

            <div class="card shadow p-4">

                <h5>Activity Logs</h5>

                <table class="table table-striped mt-3">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Status</th>
                            <th>Decision</th>
                            <th>Risk</th>
                            <th>Reason</th>
                        </tr>
                    </thead>
                    <tbody id="logTable"></tbody>
                </table>

            </div>

        </div>

    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>

let logCount = 0;

async function runTransaction() {

    const deviceUuid = document.getElementById("deviceUuid").value;
    const payload = document.getElementById("payload").value;
    const amount = document.getElementById("amount").value;
    const recipient = document.getElementById("recipient").value;

    // 1. Challenge
    const chRes = await fetch(`/api/v1/attest/challenge?deviceUuid=${deviceUuid}`);
    const chData = await chRes.json();

    // 2. Sign
    const signRes = await fetch('/api/v1/test/simulate-sign', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ deviceUuid, challenge: chData.challenge, payload })
    });

    const signData = await signRes.json();

    // 3. Transaction
    const txnRes = await fetch('/api/v1/transaction/process', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            deviceUuid,
            challenge: chData.challenge,
            payload,
            signatureBase64: signData.signatureBase64,
            amount,
            recipient
        })
    });

    const data = await txnRes.json();

    let cls = "";
    if (data.decision === "ALLOW") cls = "status-allow";
    else if (data.decision === "CHALLENGE") cls = "status-challenge";
    else cls = "status-deny";

    document.getElementById("status").innerText = data.status;
    document.getElementById("decision").innerHTML = `<span class="${cls}">${data.decision}</span>`;
    document.getElementById("reason").innerText = data.reason;
    document.getElementById("riskScore").innerText = data.riskScore;
    document.getElementById("txnIdDisplay").innerText = data.transactionId || "-";

    if (data.transactionId) {
        document.getElementById("txnId").value = data.transactionId;
    }

    // 🔥 Add to logs
    addLog(data);
}

function addLog(data) {

    logCount++;

    const row = `
        <tr>
            <td>${logCount}</td>
            <td>${data.status}</td>
            <td>${data.decision}</td>
            <td>${data.riskScore}</td>
            <td>${data.reason}</td>
        </tr>
    `;

    document.getElementById("logTable").innerHTML += row;
}

async function verifyOtp() {

    const txnId = document.getElementById("txnId").value;
    const otp = document.getElementById("otp").value;

    const res = await fetch('/api/v1/transaction/verify-otp', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ transactionId: txnId, otp })
    });

    const data = await res.json();

    document.getElementById("otpResult").innerHTML =
        `<div class="alert ${data.status === "SUCCESS" ? "alert-success" : "alert-danger"}">
            ${data.message}
        </div>`;
}

</script>

</body>
</html>
